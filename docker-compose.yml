# QuantBridge — 로컬 개발 환경
# Phase 0 Session 1 (ADR-002)
# 실행: docker compose up -d

services:
  # PostgreSQL + TimescaleDB extension (단일 인스턴스)
  # OHLCV 시계열은 hypertable로, 일반 테이블은 public 스키마로 분리 운영
  db:
    image: timescale/timescaledb:2.14.2-pg15
    container_name: quantbridge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-quantbridge}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-quantbridge} -d ${POSTGRES_DB:-quantbridge}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantbridge

  # Redis — 캐시 + Celery 브로커 + Celery 결과 백엔드
  # DB 0: 캐시, DB 1: Celery broker, DB 2: Celery result backend
  redis:
    image: redis:7-alpine
    container_name: quantbridge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantbridge

  # Backtest worker — Celery prefork (vectorbt/asyncpg fork-safe)
  backend-worker:
    build:
      context: ./backend
    container_name: quantbridge-worker
    command: uv run celery -A src.tasks.celery_app worker --loglevel=info --pool=prefork --concurrency=2
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-quantbridge}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-quantbridge}
      REDIS_URL: redis://redis:6379/0
      REDIS_LOCK_URL: ${REDIS_LOCK_URL:-redis://redis:6379/3}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OHLCV_PROVIDER: ${OHLCV_PROVIDER:-timescale}
      OHLCV_FIXTURE_ROOT: /app/data/fixtures/ohlcv
      DEFAULT_EXCHANGE: ${DEFAULT_EXCHANGE:-bybit}
      BACKTEST_STALE_THRESHOLD_SECONDS: ${BACKTEST_STALE_THRESHOLD_SECONDS:-1800}
      PINE_ALERT_HEURISTIC_MODE: ${PINE_ALERT_HEURISTIC_MODE:-strict}
      TRADING_ENCRYPTION_KEYS: ${TRADING_ENCRYPTION_KEYS:?required — generate via Fernet.generate_key()}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_placeholder}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-whsec_placeholder}
    restart: unless-stopped
    networks:
      - quantbridge

  # Sprint 12 Phase C — Bybit Private WebSocket stream worker
  # ws_stream queue 전용 (concurrency=1 — codex G3 #5/#7 dogfood 1-user 가정).
  # acks_late + reject_on_worker_lost 는 celery_app.conf 에서 설정.
  backend-ws-stream:
    build:
      context: ./backend
    container_name: quantbridge-ws-stream
    # G4 revisit fix: --pool=solo (prefork 시 worker_shutdown 이 main 에서 실행되어
    # task child process 의 _STOP_EVENTS 못 봄). solo pool 은 main process 가 직접
    # task 실행 → worker_shutdown 가 같은 process 에서 stop_event set 가능.
    command: uv run celery -A src.tasks.celery_app worker -Q ws_stream --pool=solo --concurrency=1 --loglevel=info
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-quantbridge}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-quantbridge}
      REDIS_URL: redis://redis:6379/0
      REDIS_LOCK_URL: ${REDIS_LOCK_URL:-redis://redis:6379/3}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TRADING_ENCRYPTION_KEYS: ${TRADING_ENCRYPTION_KEYS:?required — generate via Fernet.generate_key()}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_placeholder}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-whsec_placeholder}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    restart: unless-stopped
    networks:
      - quantbridge

  # Beat scheduler — reclaim_stale_running 5분 주기 (M3 T29) + ws_reconcile 5분 (Sprint 12)
  # Settings() 가 src.core.config import 시 trading_encryption_keys 등 require →
  # backend-worker 와 동일 env 셋업.
  backend-beat:
    build:
      context: ./backend
    container_name: quantbridge-beat
    command: uv run celery -A src.tasks.celery_app beat --loglevel=info --schedule=/data/celerybeat-schedule
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-quantbridge}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-quantbridge}
      REDIS_URL: redis://redis:6379/0
      REDIS_LOCK_URL: ${REDIS_LOCK_URL:-redis://redis:6379/3}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OHLCV_PROVIDER: ${OHLCV_PROVIDER:-timescale}
      OHLCV_FIXTURE_ROOT: /app/data/fixtures/ohlcv
      DEFAULT_EXCHANGE: ${DEFAULT_EXCHANGE:-bybit}
      BACKTEST_STALE_THRESHOLD_SECONDS: ${BACKTEST_STALE_THRESHOLD_SECONDS:-1800}
      PINE_ALERT_HEURISTIC_MODE: ${PINE_ALERT_HEURISTIC_MODE:-strict}
      TRADING_ENCRYPTION_KEYS: ${TRADING_ENCRYPTION_KEYS:?required — generate via Fernet.generate_key()}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_placeholder}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-whsec_placeholder}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - beat-data:/data
    restart: unless-stopped
    networks:
      - quantbridge

volumes:
  db-data:
  redis-data:
  beat-data:

networks:
  quantbridge:
    driver: bridge

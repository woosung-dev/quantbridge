name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# dorny/paths-filter가 PR 변경 파일 목록을 조회할 수 있도록 최소 권한 부여
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 변경된 경로 감지 — frontend/backend 스캐폴딩 전에는 빈 결과로 스킵
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # LESSON-004 보조 방어선: `rules-of-hooks` override 만 차단.
      # set-state-in-effect 는 Next.js router (useSearchParams) / DOM subscription
      # 등 정당한 외부 동기화 케이스가 있어 grep 대신 ESLint error-level 에서 처리
      # (override 시 disable 주석이 파일에 남음 → PR 리뷰에서 정당성 판단).
      - name: Block react-hooks/rules-of-hooks ESLint disable
        run: |
          if grep -rn --include='*.ts' --include='*.tsx' \
             'eslint-disable.*react-hooks/rules-of-hooks' src/; then
            echo "::error::react-hooks/rules-of-hooks disable 금지 (LESSON-004)"
            exit 1
          fi
      - run: pnpm lint
      - run: pnpm tsc --noEmit
      - run: pnpm test -- --run
      # NOTE: pnpm build / Playwright E2E 는 실제 Clerk publishable key 가 있어야
      # 작동 (placeholder 로는 /strategies/new prerender + dev 서버 기동 실패).
      # Follow-up 스프린트: CLERK_TEST_PUBLISHABLE_KEY / _SECRET_KEY 를 repo secret
      # 으로 등록한 뒤 이 주석 영역을 build + e2e job 으로 복원.
      # 로컬 수동: `cd frontend && pnpm build` + `pnpm e2e` 로 실행 가능.

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: timescale/timescaledb:2.14.2-pg15
        env:
          POSTGRES_USER: quantbridge
          POSTGRES_PASSWORD: password
          POSTGRES_DB: quantbridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantbridge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run mypy src/
      - run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://quantbridge:password@localhost:5432/quantbridge_test
          TRADING_ENCRYPTION_KEYS: "MiqlMqTkIxWclJ-STQ7t6BUyYlh4qnhminJHXUJJouc="
      - run: uv run pytest -v
        env:
          DATABASE_URL: postgresql+asyncpg://quantbridge:password@localhost:5432/quantbridge_test
          REDIS_URL: redis://localhost:6379/0
          TRADING_ENCRYPTION_KEYS: "MiqlMqTkIxWclJ-STQ7t6BUyYlh4qnhminJHXUJJouc="

  # Sprint FE-01 LESSON-004 Playwright E2E job은 Clerk test key secret 설정
  # 이후 활성화 예정. 현재 frontend/playwright.config.ts + frontend/e2e/smoke.spec.ts
  # 파일은 보존되어 로컬 수동 실행 가능 (cd frontend && pnpm e2e).
  # CI 자동화 추가 시 위 주석 영역을 job 으로 복원 + repo secret 3개 주입:
  #   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY / CLERK_SECRET_KEY / PLAYWRIGHT_BASE_URL(선택)

  # 전체 잡이 skip 되어도 PR 머지 가능하도록 요약 잡
  ci:
    needs: [frontend, backend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "frontend=${{ needs.frontend.result }}"
          echo "backend=${{ needs.backend.result }}"
          if [[ "${{ needs.frontend.result }}" == "failure" || \
                "${{ needs.backend.result }}" == "failure" ]]; then
            exit 1
          fi

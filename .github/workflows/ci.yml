name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# dorny/paths-filter가 PR 변경 파일 목록을 조회할 수 있도록 최소 권한 부여
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 변경된 경로 감지 — frontend/backend 스캐폴딩 전에는 빈 결과로 스킵
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # LESSON-004 보조 방어선: `rules-of-hooks` override 만 차단.
      # set-state-in-effect 는 Next.js router (useSearchParams) / DOM subscription
      # 등 정당한 외부 동기화 케이스가 있어 grep 대신 ESLint error-level 에서 처리
      # (override 시 disable 주석이 파일에 남음 → PR 리뷰에서 정당성 판단).
      - name: Block react-hooks/rules-of-hooks ESLint disable
        run: |
          if grep -rn --include='*.ts' --include='*.tsx' \
             'eslint-disable.*react-hooks/rules-of-hooks' src/; then
            echo "::error::react-hooks/rules-of-hooks disable 금지 (LESSON-004)"
            exit 1
          fi
      - run: pnpm lint
      - run: pnpm tsc --noEmit
      - run: pnpm test -- --run
      # Sprint FE-02 복원: Clerk test key secret 주입 후 build 활성화.
      # /strategies/new 등 Clerk 의존 페이지 prerender 는 실제 publishable key 필요.
      - run: pnpm build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: timescale/timescaledb:2.14.2-pg15
        env:
          POSTGRES_USER: quantbridge
          POSTGRES_PASSWORD: password
          POSTGRES_DB: quantbridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantbridge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run mypy src/
      - run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://quantbridge:password@localhost:5432/quantbridge_test
          TRADING_ENCRYPTION_KEYS: "MiqlMqTkIxWclJ-STQ7t6BUyYlh4qnhminJHXUJJouc="
      - run: uv run pytest -v
        env:
          DATABASE_URL: postgresql+asyncpg://quantbridge:password@localhost:5432/quantbridge_test
          REDIS_URL: redis://localhost:6379/0
          TRADING_ENCRYPTION_KEYS: "MiqlMqTkIxWclJ-STQ7t6BUyYlh4qnhminJHXUJJouc="

  # Sprint FE-01 LESSON-004 Playwright E2E — vitest jsdom 이 못 잡는 Fast Refresh /
  # StrictMode / React Query refetch 케이스를 실제 브라우저로 재현.
  # Clerk test publishable/secret key 는 repo secret 으로 주입.
  e2e:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # 전체 잡이 skip 되어도 PR 머지 가능하도록 요약 잡
  ci:
    needs: [frontend, backend, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "frontend=${{ needs.frontend.result }}"
          echo "backend=${{ needs.backend.result }}"
          echo "e2e=${{ needs.e2e.result }}"
          if [[ "${{ needs.frontend.result }}" == "failure" || \
                "${{ needs.backend.result }}" == "failure" || \
                "${{ needs.e2e.result }}" == "failure" ]]; then
            exit 1
          fi

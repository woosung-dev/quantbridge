name: Trust Layer Nightly

# Path β ADR-013 §10.1 Q2 "Mutation Oracle nightly only" 결정의 실 구현.
# Opus Gate-3 W-1 / Codex W-2c1 해소 (nightly workflow 실체 부재 해소).
#
# 실행 방식:
# - schedule: 매일 18:00 UTC (KST 03:00) — 다음날 오전 확인 가능
# - workflow_dispatch: 수동 실행 (개발자가 PR 전에 mutation 감지력 검증)
#
# 실패 시: GitHub issue 자동 생성 (Path β trust-layer/mutation-regression 라벨)

on:
  schedule:
    - cron: "0 18 * * *" # 매일 18:00 UTC = KST 다음날 03:00
  workflow_dispatch:

permissions:
  contents: read
  issues: write # failure 시 issue 자동 생성용

jobs:
  mutation-oracle:
    name: Mutation Oracle (Path β Stage 2c)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: timescale/timescaledb:2.14.2-pg15
        env:
          POSTGRES_USER: quantbridge
          POSTGRES_PASSWORD: password
          POSTGRES_DB: quantbridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantbridge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://quantbridge:password@localhost:5432/quantbridge_test
          TRADING_ENCRYPTION_KEYS: "MiqlMqTkIxWclJ-STQ7t6BUyYlh4qnhminJHXUJJouc="

      # Mutation Oracle 전용 실행 — --run-mutations 플래그로 `@pytest.mark.mutation` 활성.
      # Path β SLO TL-E-5: ≥7/8 감지. 현재 Stage 2c 1차는 4/8 + 2차 이연 4개.
      - name: Run Mutation Oracle
        run: |
          uv run pytest \
            tests/strategy/pine_v2/test_mutation_oracle.py \
            --run-mutations \
            -v --durations=10
        env:
          DATABASE_URL: postgresql+asyncpg://quantbridge:password@localhost:5432/quantbridge_test
          REDIS_URL: redis://localhost:6379/0
          TRADING_ENCRYPTION_KEYS: "MiqlMqTkIxWclJ-STQ7t6BUyYlh4qnhminJHXUJJouc="

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Trust Layer Nightly — Mutation Oracle regression (${new Date().toISOString().slice(0, 10)})`;
            const body = [
              `Path β Mutation Oracle nightly 실행이 **실패**했습니다.`,
              ``,
              `- **실행 로그**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- **commit**: ${context.sha}`,
              ``,
              `## 조치`,
              `1. 실행 로그에서 어떤 mutation 이 감지 안 됐는지 확인`,
              `2. 감지 실패가 **의도된 변경** (drift 계수 재조정) 이면 ADR-013 §10.2 / §11 Amendment 갱신`,
              `3. **의도치 않은 regression** 이면 P-1/2/3 강화 또는 mutation 재설계`,
              `4. SLO TL-E-5 ≥7/8 유지 여부 재검증 (현 Stage 2c 1차: 4/8 감지 + 2차 이연 4개)`,
              ``,
              `_Auto-generated by trust-layer-nightly workflow._`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['trust-layer', 'mutation-regression'],
            });

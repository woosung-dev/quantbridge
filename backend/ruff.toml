line-length = 100
target-version = "py311"
extend-exclude = ["alembic/versions"]

[lint]
select = [
    "E", "F", "W",   # pycodestyle + pyflakes
    "I",             # isort
    "B",             # flake8-bugbear
    "UP",            # pyupgrade
    "SIM",           # flake8-simplify
    "C4",            # comprehensions
    "ASYNC",         # flake8-async
    "S",             # bandit
    "RUF",
]
ignore = [
    "E501",   # line length handled by formatter
    "S101",   # assert in tests
    "B008",   # FastAPI Depends() in defaults
]

[lint.per-file-ignores]
# Test files: 한국어 docstring + 수학 기호 (×, ∪, ⊆, ⟺ 등) 허용
# scripts/: 유틸 스크립트도 한국어 docstring + 수학 기호 동일 허용
"tests/**/*.py" = ["S", "B", "RUF001", "RUF002", "RUF003"]
"scripts/**/*.py" = ["RUF001", "RUF002", "RUF003"]

[lint.isort]
known-first-party = ["src"]

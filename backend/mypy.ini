[mypy]
python_version = 3.12
strict = True
plugins = pydantic.mypy
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = True
exclude = (alembic/versions|tests)

[mypy-tests.*]
disallow_untyped_defs = False

[mypy-alembic.*]
ignore_errors = True

# vectorbt (>=0.28)는 py.typed 마커 미제공. 서드파티 stub도 없음.
[mypy-vectorbt.*]
ignore_missing_imports = True

# src.tasks는 Task 12에서 생성. 순환 import 방지용 지연 import 사용.
[mypy-src.tasks.*]
ignore_missing_imports = True

# asyncpg: py.typed 마커 미제공. 서드파티 stub도 없음.
[mypy-asyncpg.*]
ignore_missing_imports = True

# celery: py.typed 마커 미제공. 서드파티 stub도 없음.
[mypy-celery]
ignore_missing_imports = True

[mypy-celery.signals]
ignore_missing_imports = True

[mypy-celery.schedules]
ignore_missing_imports = True

# ccxt: py.typed 미제공. 서드파티 stub도 없음.
[mypy-ccxt]
ignore_missing_imports = True

[mypy-ccxt.async_support]
ignore_missing_imports = True

# tenacity: 0.22.x부터 py.typed 제공하나 일부 버전에서 불안정. 보수적으로 ignore.
[mypy-tenacity]
ignore_missing_imports = True

[pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True

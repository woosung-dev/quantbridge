# 로컬 포트 격리 + isolated 한정 worker auto-rebuild (BL-181, Sprint 38)
# 다른 웹앱과 병렬 실행 시 host port 만 변경. 컨테이너 내부 포트(5432/6379)는 그대로 유지.
#
# 사용법:
#   make up-isolated         (port 격리만)
#   make up-isolated-watch   (port 격리 + worker/ws-stream/beat 가 src 변경 시 자동 reload)
#
# `!override` tag (Compose Spec, docker compose v2.24+) — list 키 (ports/command/volumes) 를
# append 가 아니라 완전 대체. base 의 command/ports 와 충돌하지 않도록 명시.
#
# BL-181 — backend-worker / backend-ws-stream / backend-beat 3 서비스에 한해
# `./backend/src` host 디렉터리를 `:ro` bind-mount 하고 watchfiles wrapper 로 celery 를 감싼다.
# host src 가 SoT 이므로 `:ro` 안전. 패키지 추가는 image rebuild 가 의무 (별도 ADR).
#
# WARNING: base mode (`make up`) 와 isolated mode 동시 운영 시 `quantbridge-*` container_name
# 충돌 발생. base 와 isolated 는 mutually exclusive (ADR docs/07_infra/2026-05-06-bl-181-*.md).

services:
  db:
    ports: !override
      - "5433:5432"

  redis:
    ports: !override
      - "6380:6379"

  backend-worker:
    volumes: !override
      - ./backend/src:/app/src:ro
    command: !override
      - "uv"
      - "run"
      - "watchfiles"
      - "--filter"
      - "python"
      - "celery -A src.tasks.celery_app worker --loglevel=info --pool=prefork --concurrency=2"
      - "/app/src"

  backend-ws-stream:
    volumes: !override
      - ./backend/src:/app/src:ro
    command: !override
      - "uv"
      - "run"
      - "watchfiles"
      - "--filter"
      - "python"
      - "celery -A src.tasks.celery_app worker --loglevel=info --pool=prefork --concurrency=2 --queues=ws_stream"
      - "/app/src"

  backend-beat:
    volumes: !override
      - ./backend/src:/app/src:ro
      - beat-data:/data
    command: !override
      - "uv"
      - "run"
      - "watchfiles"
      - "--filter"
      - "python"
      - "celery -A src.tasks.celery_app beat --loglevel=info --schedule=/data/celerybeat-schedule"
      - "/app/src"
